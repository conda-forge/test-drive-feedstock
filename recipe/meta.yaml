{% set name = "test-drive" %}
{% set version = "0.6.0" %}

package:
  name: {{ name }}-pkg
  version: {{ version }}

source:
  url: https://github.com/fortran-lang/test-drive/releases/download/v{{ version }}/test-drive-{{ version }}.tar.xz
  sha256: dca77ab3c646b99945f4a3cb75eb8c9885123a55cd509b8992307fabf7e7d07b

build:
  number: 2

outputs:
  - name: {{ name }}
    script: build_pkg.sh   # [unix]
    script: build_pkg.bat  # [win]
    build:
      string: {{ module_abi }}_h{{ PKG_HASH }}_{{ PKG_BUILDNUM }}
      run_exports:
        - {{ pin_subpackage(name, max_pin='x.x') }}

    requirements:
      build:
        - {{ stdlib('c') }}  # [unix or (win and module_abi == "flang")]
        - {{ stdlib('m2w64_c') }}  # [win and module_abi == "gfortran"]
        - {{ compiler('c') }}  # [unix or (win and module_abi == "flang")]
        - {{ compiler('fortran') }}  # [unix or (win and module_abi == "flang")]
        - {{ compiler('m2w64_c') }}  # [win and module_abi == "gfortran"]
        - {{ compiler('m2w64_fortran') }}  # [win and module_abi == "gfortran"]
        - ifx_{{ target_platform }} 2025.*  # [module_abi == "ifx"]
        - meson  # [module_abi == "gfortran"]
        - cmake  # [module_abi != "gfortran"]
        - ninja
      run:
        - libgcc  # [osx]

    test:
      requires:
        - pkg-config
      commands:
        - pkg-config {{ name }} --exact-version {{ version }}
        - test -f $PREFIX/lib/lib{{ name }}$SHLIB_EXT  # [unix]
        - test ! -f $PREFIX/lib/lib{{ name }}.a  # [unix]

  - name: {{ name }}-devel
    build:
      string: {{ module_abi }}_h{{ PKG_HASH }}_{{ PKG_BUILDNUM }}
      run_exports:
        - {{ pin_subpackage(name, max_pin='x.x') }} {{ module_abi }}_*

    requirements:
      run:
        - {{ pin_subpackage(name, max_pin='x.x') }} {{ module_abi }}_*

    test:
      requires:
        - pkg-config
      commands:
        - pkg-config {{ name }} --exact-version {{ version }}
        - test -f $PREFIX/lib/lib{{ name }}$SHLIB_EXT  # [unix]
        - test ! -f $PREFIX/lib/lib{{ name }}.a  # [unix]

about:
  home: https://github.com/fortran-lang/test-drive
  license: Apache-2.0 OR MIT
  license_file:
    - LICENSE-Apache
    - LICENSE-MIT
  summary: >-
    Simple testing framework for Fortran

extra:
  recipe-maintainers:
    - awvwgk
    - mwtoews
  feedstock-name: {{ name }}
